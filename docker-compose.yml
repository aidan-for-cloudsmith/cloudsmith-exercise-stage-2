version: '3.9'
services:
  transform_service:
    build:
      context: ./services/transform_service
      dockerfile: Dockerfile
    command: python -m transform_service.main
    volumes:
      - ./services/transform_service:/app
  query_api:
    build:
      context: ./services/query_api
      dockerfile: Dockerfile
    command: python -m query_api.main
    ports:
      - "8000:8000"
    volumes:
      - ./services/query_api:/app
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
    command: server /data --console-address ":9001"
    volumes:
      - ./minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

